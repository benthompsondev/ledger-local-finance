name: Ledger validation

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Compile Python files
        shell: pwsh
        run: |
          $env:PYTHONIOENCODING = "utf-8"
          python -m compileall -q app.py pages utils parsers scripts components

      - name: Check tracked files for private artifacts
        shell: pwsh
        run: |
          $tracked = git ls-files
          $forbidden = $tracked | Select-String -Pattern '(^|/)config\.json$|(^|/)finance.*\.db($|-)|launcher\.log|CLAUDE_HANDOFF|\.zip$|\.pdf$|\.env$'
          if ($forbidden) {
            $forbidden
            throw "Private artifact path tracked in git."
          }

      - name: Run smoke suite
        run: python -m scripts.smoke_test

      - name: Export read-only agent context
        run: python -m scripts.export_agent_context

      - name: Build privacy-safe share zip
        run: python -m scripts.make_share_zip
