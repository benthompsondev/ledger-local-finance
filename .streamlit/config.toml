[theme]
base                     = "dark"
primaryColor             = "#34d058"
backgroundColor          = "#0d1117"
secondaryBackgroundColor = "#161b22"
textColor                = "#e6edf3"
font                     = "sans serif"

[server]
headless     = true
# Bind to localhost only by default so Ledger is not exposed on a shared
# or public network. Override on the CLI only when LAN access is intentional.
address      = "127.0.0.1"
port         = 8501
enableCORS   = false
enableXsrfProtection = true

[browser]
gatherUsageStats = false

[runner]
# Silence deprecation noise in logs
magicEnabled = false
